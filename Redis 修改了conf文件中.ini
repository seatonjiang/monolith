Redis 修改了conf文件中

1、

bind 0.0.0.0

bind 改为了 0.0.0.0，Redis 服务没有暴露端口到宿主机，只供内部服务访问，所以没有安全问题。


2、

save 900 1
save 300 10
save 60 10000

定义了 Redis 自动执行 RDB 快照保存的条件：

- 1.
分层保护策略

- 低频变更：15分钟内1个变更就保存
- 中频变更：5分钟内10个变更就保存
- 高频变更：1分钟内10000个变更就保存
- 2.
适合大多数应用场景

- 覆盖了从低到高的各种数据变更频率
- 在数据安全和性能之间取得良好平衡
- 3.
Docker 环境友好

- 配合 volume 映射确保数据持久化
- 容器重启后数据不丢失


3、

rename-command FLUSHALL ""
rename-command EVAL     ""
rename-command FLUSHDB  ""

### 被禁用的危险命令
1. 1.
   FLUSHALL
   
   - 功能 ：清空所有数据库的所有键
   - 危险性 ：会删除 Redis 中的所有数据
   - 禁用原因 ：防止意外或恶意清空整个 Redis 实例
2. 2.
   FLUSHDB
   
   - 功能 ：清空当前数据库的所有键
   - 危险性 ：会删除当前数据库的所有数据
   - 禁用原因 ：防止意外清空数据库
3. 3.
   CONFIG
   
   - 功能 ：动态修改 Redis 配置
   - 危险性 ：可以修改关键配置参数
   - 禁用原因 ：防止未授权的配置修改
4. 4.
   EVAL
   
   - 功能 ：执行 Lua 脚本
   - 危险性 ：可能执行恶意脚本或消耗大量资源
   - 禁用原因 ：防止脚本注入攻击



