main:
  # 每次提交同步仓库到 GitHub
  push:
    - name: 同步仓库到 GitHub
      imports:
        - https://cnb.cool/seatonjiang/secret-key/-/blob/main/github.yaml
      stages:
        - name: 同步仓库
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/seatonjiang/monolith.git
            auth_type: https
            username: ${GITHUB_USERNAME}
            password: ${GITHUB_ACCESS_TOKEN}

  # 手动构建 PHP 8.1 镜像
  web_trigger_build_php81:
    - name: 构建 PHP 8.1 AMD64
      runner:
        tags: cnb:arch:amd64
      services:
        - docker
      env:
        IMAGE_TAG: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}/php:8.1-fpm-alpine-linux-amd64
      stages:
        - name: 登录制品库
          script: docker login -u ${CNB_TOKEN_USER_NAME} -p "${CNB_TOKEN}" ${CNB_DOCKER_REGISTRY}
        - name: 构建镜像
          script: docker build -t ${IMAGE_TAG} -f ./.cnb/dockerfile-php-8.1 .
        - name: 推送镜像
          script: docker push ${IMAGE_TAG}
        - name: 构建完成
          type: cnb:resolve
          options:
            key: build-php81-amd64

    - name: 构建 PHP 8.1 ARM64
      runner:
        tags: cnb:arch:arm64:v8
      services:
        - docker
      env:
        IMAGE_TAG: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}/php:8.1-fpm-alpine-linux-arm64
      stages:
        - name: 登录制品库
          script: docker login -u ${CNB_TOKEN_USER_NAME} -p "${CNB_TOKEN}" ${CNB_DOCKER_REGISTRY}
        - name: 构建镜像
          script: docker build -t ${IMAGE_TAG} -f ./.cnb/dockerfile-php-8.1 .
        - name: 推送镜像
          script: docker push ${IMAGE_TAG}
        - name: 构建完成
          type: cnb:resolve
          options:
            key: build-php81-arm64

    - name: 合并 PHP 8.1 AMD64 和 ARM64
      services:
        - docker
      env:
        IMAGE_TAG: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}/php:8.1-fpm-alpine
      stages:
        - name: 等待 AMD64 构建完成
          type: cnb:await
          options:
            key: build-php81-amd64
        - name: 等待 ARM64 构建完成
          type: cnb:await
          options:
            key: build-php81-arm64
        - name: 合并镜像
          image: cnbcool/manifest
          settings:
            target: ${IMAGE_TAG}
            template: ${IMAGE_TAG}-OS-ARCH
            platforms:
              - linux/amd64
              - linux/arm64
        - name: 删除临时镜像
          type: artifact:remove-tag
          options:
            name: ${REPO_NAME}/php
            tags:
              - 8.1-fpm-alpine-linux-amd64
              - 8.1-fpm-alpine-linux-arm64
            type: docker

