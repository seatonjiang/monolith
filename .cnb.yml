# 构建镜像模板
.build-amd64-template: &build-amd64-template
  runner:
    tags: cnb:arch:amd64
  services:
    - docker
  stages:
    - name: 登录制品库
      script: docker login -u ${CNB_TOKEN_USER_NAME} -p "${CNB_TOKEN}" ${CNB_DOCKER_REGISTRY}
    - name: 构建镜像
      script: docker build -t ${IMAGE_TAG} -f ${DOCKERFILE_PATH} .
    - name: 推送镜像
      script: docker push ${IMAGE_TAG}
    - name: 构建完成
      type: cnb:resolve
      options:
        key: ${BUILD_KEY}

.build-arm64-template: &build-arm64-template
  runner:
    tags: cnb:arch:arm64:v8
  services:
    - docker
  stages:
    - name: 登录制品库
      script: docker login -u ${CNB_TOKEN_USER_NAME} -p "${CNB_TOKEN}" ${CNB_DOCKER_REGISTRY}
    - name: 构建镜像
      script: docker build -t ${IMAGE_TAG} -f ${DOCKERFILE_PATH} .
    - name: 推送镜像
      script: docker push ${IMAGE_TAG}
    - name: 构建完成
      type: cnb:resolve
      options:
        key: ${BUILD_KEY}

.merge-template: &merge-template
  services:
    - docker
  stages:
    - name: 等待 AMD64 构建完成
      type: cnb:await
      options:
        key: ${AMD64_BUILD_KEY}
    - name: 等待 ARM64 构建完成
      type: cnb:await
      options:
        key: ${ARM64_BUILD_KEY}
    - name: 合并镜像
      image: cnbcool/manifest
      settings:
        target: ${FINAL_IMAGE_TAG}
        template: ${FINAL_IMAGE_TAG}-OS-ARCH
        platforms:
          - linux/amd64
          - linux/arm64
    - name: 删除临时镜像
      type: artifact:remove-tag
      options:
        name: ${REPO_NAME}/${IMAGE_NAME}
        tags:
          - ${IMAGE_TAG_AMD64}
          - ${IMAGE_TAG_ARM64}
        type: docker

# 拉取镜像模板
.pull-amd64-template: &pull-amd64-template
  runner:
    tags: cnb:arch:amd64
    cpus: 1
  services:
    - docker
  stages:
    - name: 登录制品库
      script: docker login -u ${CNB_TOKEN_USER_NAME} -p "${CNB_TOKEN}" ${CNB_DOCKER_REGISTRY}
    - name: 拉取镜像
      script: docker pull ${SOURCE_IMAGE}
    - name: 重命名镜像
      script: docker tag ${SOURCE_IMAGE} ${IMAGE_TAG}
    - name: 推送镜像
      script: docker push ${IMAGE_TAG}
    - name: 构建完成
      type: cnb:resolve
      options:
        key: ${BUILD_KEY}

.pull-arm64-template: &pull-arm64-template
  runner:
    tags: cnb:arch:arm64:v8
    cpus: 1
  services:
    - docker
  stages:
    - name: 登录制品库
      script: docker login -u ${CNB_TOKEN_USER_NAME} -p "${CNB_TOKEN}" ${CNB_DOCKER_REGISTRY}
    - name: 拉取镜像
      script: docker pull ${SOURCE_IMAGE}
    - name: 重命名镜像
      script: docker tag ${SOURCE_IMAGE} ${IMAGE_TAG}
    - name: 推送镜像
      script: docker push ${IMAGE_TAG}
    - name: 构建完成
      type: cnb:resolve
      options:
        key: ${BUILD_KEY}

main:
  # 构建 PHP 8.1 镜像
  web_trigger_build_php81:
    - name: 构建 PHP 8.1 AMD64
      <<: *build-amd64-template
      env:
        IMAGE_TAG: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}/php:8.1-fpm-alpine-linux-amd64
        DOCKERFILE_PATH: ./.cnb/dockerfile/php-8.1
        BUILD_KEY: build-php81-amd64

    - name: 构建 PHP 8.1 ARM64
      <<: *build-arm64-template
      env:
        IMAGE_TAG: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}/php:8.1-fpm-alpine-linux-arm64
        DOCKERFILE_PATH: ./.cnb/dockerfile/php-8.1
        BUILD_KEY: build-php81-arm64

    - name: 合并 PHP 8.1 AMD64 和 ARM64
      <<: *merge-template
      env:
        FINAL_IMAGE_TAG: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}/php:8.1-fpm-alpine
        AMD64_BUILD_KEY: build-php81-amd64
        ARM64_BUILD_KEY: build-php81-arm64
        REPO_NAME: ${REPO_NAME}
        IMAGE_NAME: php
        IMAGE_TAG_AMD64: 8.1-fpm-alpine-linux-amd64
        IMAGE_TAG_ARM64: 8.1-fpm-alpine-linux-arm64

