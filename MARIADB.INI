## 根据服务器资源调整建议
### 小型服务器（2GB RAM）
```
innodb_buffer_pool_size=256M
tmp_table_size=128M
max_heap_table_size=128M
```
### 中型服务器（4GB RAM）
```
innodb_buffer_pool_size=512M
tmp_table_size=256M
max_heap_table_size=256M
```
### 大型服务器（8GB+ RAM）
```
innodb_buffer_pool_size=2G
tmp_table_size=512M
max_heap_table_size=512M
```
