name: Sync Docker Image

permissions:
  packages: write
  contents: write

on:
  workflow_dispatch:
    inputs:
      images:
        description: "要同步的 Docker 镜像列表，格式为 '镜像1:标签1,镜像2:标签2,镜像3:标签3'"
        required: true
        default: ""

jobs:
  docker-image-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y jq skopeo

      - name: 设置 GHCR_USER 环境变量
        id: set_ghcr_user
        run: echo "GHCR_USER=$(echo '${{ github.actor }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: seatonjiang
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to CNB
        uses: docker/login-action@v3
        with:
          registry: docker.cnb.cool
          username: cnb
          password: ${{ secrets.CNB_DOCKER_TOKEN }}

      - name: 同步镜像并更新 README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase

          # --- 1. 镜像同步与信息收集 ---
          NEW_ROWS_DATA=""
          UNIQUE_SEPARATOR="%%%"
          TABLE_TITLE="### Synced Images"

          existing_source_images=$(awk '
            $0 == "'"${TABLE_TITLE}"'" { in_table=1; next }
            in_table {
              if (/^\| [0-9]/) { 
                match($0, /\| *[^|]+ *\| *([^|]+) *\|/);
                if (RSTART) { print substr($0, RSTART, RLENGTH) }
              }
              if (!/^\|/ && !/^$/) { in_table=0 }
            }
          ' README.md | sed -e 's/|//g' -e 's/^[ \t]*//;s/[ \t]*$//')

          IFS=',' read -r -a image_array <<< "${{ inputs.images }}"

          for i in "${!image_array[@]}"; do
            full_image=$(echo "${image_array[$i]}" | xargs)
            if [ -z "$full_image" ]; then continue; fi

            if echo "$existing_source_images" | grep -qFx "$full_image"; then
              echo "镜像 $full_image 已存在于 README.md，跳过。"
              continue
            fi
            
            echo "--------------------------------------------------"
            echo "===== 开始处理 $full_image ====="
            current_image=$(echo "$full_image" | cut -d':' -f1)
            current_tag=$(echo "$full_image" | cut -s -d':' -f2); [ -z "$current_tag" ] && current_tag="latest"
            target_tag="$current_tag"; [[ "$current_tag" =~ "alpine" ]] && target_tag="alpine"
            
            if [ "$current_tag" == "latest" ] || [ "$target_tag" == "alpine" ]; then 
              sync_status="✔️"
            else 
              sync_status="❌"
            fi
            
            IMAGE_NAME=$(basename "$current_image")

            SOURCE_IMAGE_URI="docker://$current_image:$current_tag"
            GHCR_IMAGE_URI="docker://ghcr.io/seatonjiang/$IMAGE_NAME:$target_tag"
            CNB_IMAGE_URI="docker://docker.cnb.cool/seatonjiang/monolith/$IMAGE_NAME:$target_tag"
            
            # --- 这是补充的完整同步逻辑 ---
            echo "源镜像: $SOURCE_IMAGE_URI"
            echo "GHCR目标镜像: $GHCR_IMAGE_URI"
            echo "CNB目标镜像: $CNB_IMAGE_URI"
            
            # 先同步到本地临时目录
            LOCAL_IMAGE_URI="dir:/tmp/docker-sync/$IMAGE_NAME:$target_tag"
            echo "同步到本地: $LOCAL_IMAGE_URI"
            
            # 创建临时目录
            mkdir -p /tmp/docker-sync
            
            # 使用 skopeo copy 进行同步到本地，--all 参数会自动处理多架构
            if skopeo copy --all "$SOURCE_IMAGE_URI" "$LOCAL_IMAGE_URI"; then
              echo "✅ 镜像同步到本地成功"
              
              # 从本地同步到 GHCR
              if skopeo copy --all "$LOCAL_IMAGE_URI" "$GHCR_IMAGE_URI"; then
                echo "✅ 镜像同步到 GHCR 成功"
              else
                echo "❌ 镜像同步到 GHCR 失败"
              fi
              
              # 从本地同步到 CNB
              if skopeo copy --all "$LOCAL_IMAGE_URI" "$CNB_IMAGE_URI"; then
                echo "✅ 镜像同步到 CNB 成功"
              else
                echo "❌ 镜像同步到 CNB 失败"
              fi
              
              # 清理临时目录
              rm -rf "/tmp/docker-sync/$IMAGE_NAME:$target_tag"
            else
              echo "❌ 镜像同步到本地失败"
              continue
            fi


            # --- 同步逻辑结束 ---

            # 准备新行的数据
            registry="ghcr.io/${{ env.GHCR_USER }}/$IMAGE_NAME"
            if [ "$target_tag" != "latest" ]; then
              registry="$registry:$target_tag"
            fi
            registry="\`$registry\`"
            
            # 获取当前日期作为同步日期（使用北京时间）
            sync_date=$(TZ='Asia/Shanghai' date +"%Y-%m-%d")
            
            # 准备新行数据
            new_line_data="${IMAGE_NAME}${UNIQUE_SEPARATOR}${registry}${UNIQUE_SEPARATOR}${sync_date}"
            NEW_ROWS_DATA+="${new_line_data}\n"
          done

          if [ -z "$NEW_ROWS_DATA" ]; then
            echo "--------------------------------------------------"
            echo "没有新的镜像被添加，无需更新 README.md。"
            exit 0
          fi

          # --- 2. README 更新、排序与重写 ---
          echo "--------------------------------------------------"
          echo "开始更新 README.md..."

          existing_rows=$(awk '
            $0 == "'"${TABLE_TITLE}"'" { in_table=1; next }
            in_table {
              if (/^\|/ && !/^\| :/ && !/^\| Name \| Registry \| Sync Date \|/) { print }
              if (!/^\|/ && !/^$/) { in_table=0 }
            }
          ' README.md)

          sorted_table_rows=$(
            {
              echo "$existing_rows" 
              echo -e "$NEW_ROWS_DATA" | sed '/^$/d' | awk -F"${UNIQUE_SEPARATOR}" '{printf("| %s | %s | %s |\n", $1, $2, $3)}'
            } | awk -F'|' '
              {
                key = $2;
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", key);
                print key "@@@" $0;
              }
            ' | sort -f | sed 's/^.*@@@//'
          )

          {
            echo "${TABLE_TITLE}"
            echo ""
            echo "| Name | Registry | Sync Date |"
            echo "| :--- | :--- | :--- |"
            echo "$sorted_table_rows"
          } > new_table.tmp

          awk '
            BEGIN { replaced=0 }
            $0 == "'"${TABLE_TITLE}"'" && !replaced {
              while ((getline line < "new_table.tmp") > 0) { print line }
              close("new_table.tmp");
              replaced=1;
              skipping=1;
              next;
            }
            skipping {
              if (!/^\|/ && !/^$/) { skipping=0 } else { next }
            }
            { print }
          ' README.md > README.tmp && mv README.tmp README.md
          rm new_table.tmp

          # 提交更改
          git add README.md
          if git diff --staged --quiet; then
            echo "没有新的镜像或文件变更可提交。"
          else
            git commit -m "chore(sync): 同步新镜像并更新README"
            git push
          fi
