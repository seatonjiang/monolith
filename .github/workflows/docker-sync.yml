name: Sync Docker Image

permissions:
  packages: write
  contents: write

on:
  workflow_dispatch:
    inputs:
      images:
        description: "要同步的 Docker 镜像列表，格式为 '镜像1:标签1,镜像2:标签2,镜像3:标签3'"
        required: true
        default: ""

jobs:
  docker-image-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # - name: Install Dependencies
      #   run: sudo apt-get update && sudo apt-get install -y jq skopeo
        
      # - name: Set up Docker Buildx
      #   uses: docker/setup-buildx-action@v3

      # - name: Login to GHCR
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: seatonjiang
      #     password: ${{ secrets.GITHUB_TOKEN }}

      # - name: Login to CNB
      #   uses: docker/login-action@v3
      #   with:
      #     registry: docker.cnb.cool
      #     username: cnb
      #     password: ${{ secrets.CNB_DOCKER_TOKEN }}

      - name: 同步镜像并更新 README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase

          NEW_ROWS_DATA=""
          UNIQUE_SEPARATOR="%%%"
          TABLE_TITLE="### Synced Images"

          existing_image_info=$(awk '
            $0 == "'"${TABLE_TITLE}"'" { in_table=1; next }
            in_table {
              if (/^\|/) {
                if (match($0, /\| *([^|]+) *\| *[^|]+ *\| *([^|]+) *\|/, parts)) {
                  name=parts[1];
                  tags=parts[2];
                  gsub(/^[ \t]*|[ \t]*$/, "", name);
                  gsub(/^[ \t]*|[ \t]*$/, "", tags);
                  print name ":::" tags;
                }
              }
              if (!/^\|/ && !/^$/) { in_table=0 }
            }
          ' README.md)

          IFS=',' read -r -a image_array <<< "${{ inputs.images }}"

          for i in "${!image_array[@]}"; do
            full_image=$(echo "${image_array[$i]}" | xargs)
            if [ -z "$full_image" ]; then continue; fi

            current_image=$(echo "$full_image" | cut -d':' -f1)
            current_tag=$(echo "$full_image" | cut -s -d':' -f2)
            IMAGE_NAME=$(basename "$current_image")
            
            image_exists=false
            existing_tags=""
            
            while IFS= read -r line; do
              if [ -z "$line" ]; then continue; fi
              
              img_name=$(echo "$line" | awk -F":::" '{print $1}')
              img_tags=$(echo "$line" | awk -F":::" '{print $2}')
              
              if [[ "$img_name" == *":"* ]]; then
                img_name=$(echo "$img_name" | cut -d':' -f1)
              fi
              
              if [ "$img_name" = "$IMAGE_NAME" ]; then
                image_exists=true
                existing_tags="$img_tags"
                break
              fi
            done <<< "$existing_image_info"
            
            if [ "$image_exists" = true ] && [[ "$existing_tags" == *"$current_tag"* ]]; then
              echo "镜像 $IMAGE_NAME 的标签 $current_tag 已存在，跳过！"
              continue
            fi
            
            echo "--------------------------------------------------"
            echo "===== 开始处理 $full_image ====="
            target_tag="$current_tag"

            SOURCE_IMAGE_URI="docker://$current_image:$current_tag"
            GHCR_IMAGE_URI="docker://ghcr.io/seatonjiang/$IMAGE_NAME:$target_tag"
            CNB_IMAGE_URI="docker://docker.cnb.cool/seatonjiang/monolith/$IMAGE_NAME:$target_tag"
          
            LOCAL_IMAGE_URI="dir:/tmp/docker-sync/$IMAGE_NAME:$target_tag"
            
            mkdir -p /tmp/docker-sync
            
            # 使用 skopeo copy 进行同步到本地，--all 参数会自动处理多架构
            # if skopeo copy --all "$SOURCE_IMAGE_URI" "$LOCAL_IMAGE_URI"; then
            #   echo "✅ 镜像同步到本地成功"
              
            #   # 从本地同步到 GHCR
            #   if skopeo copy --all "$LOCAL_IMAGE_URI" "$GHCR_IMAGE_URI"; then
            #     echo "✅ 镜像同步到 GHCR 成功"
            #   else
            #     echo "❌ 镜像同步到 GHCR 失败"
            #   fi
              
            #   # 从本地同步到 CNB
            #   if skopeo copy --all "$LOCAL_IMAGE_URI" "$CNB_IMAGE_URI"; then
            #     echo "✅ 镜像同步到 CNB 成功"
            #   else
            #     echo "❌ 镜像同步到 CNB 失败"
            #   fi
              
            #   # 清理临时目录
            #   rm -rf "/tmp/docker-sync/$IMAGE_NAME:$target_tag"
            # else
            #   echo "❌ 镜像同步到本地失败"
            #   continue
            # fi

            # 准备新行的数据
            registry="ghcr.io/seatonjiang/$IMAGE_NAME"
            
            sync_date=$(TZ='Asia/Shanghai' date +"%Y-%m-%d")
            
            if [ "$image_exists" = true ]; then
              if [ -z "$existing_tags" ]; then
                tags="$current_tag"
              else
                if [[ "$existing_tags" != *"$current_tag"* ]]; then
                  tags="$existing_tags,$current_tag"
                else
                  tags="$existing_tags"
                fi
              fi
            else
              tags="$current_tag"
            fi
            
            new_line_data="${IMAGE_NAME}${UNIQUE_SEPARATOR}${registry}${UNIQUE_SEPARATOR}${tags}${UNIQUE_SEPARATOR}${sync_date}"
            NEW_ROWS_DATA+="${new_line_data}"$'\n'
          done

          if [ -z "$NEW_ROWS_DATA" ]; then
            echo "--------------------------------------------------"
            echo "没有新的镜像被添加，无需更新 README.md。"
            exit 0
          fi

          # --- 2. README 更新、排序与重写 ---
          echo "--------------------------------------------------"
          echo "开始更新 README.md..."

          existing_rows=$(awk '
            $0 == "'"${TABLE_TITLE}"'" { in_table=1; next }
            in_table {
              if (/^\|/ && !/^\| :/ && !/^\| Name \| Registry \| Tags \| Sync Date \|/) { print }
              if (!/^\|/ && !/^$/) { in_table=0 }
            }
          ' README.md)

          # 处理新行数据，合并相同镜像的标签
          processed_new_rows=""
          while IFS= read -r line; do
            if [ -z "$line" ]; then continue; fi
            
            # 解析新行数据
            img_name=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $1}')
            img_registry=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $2}' | sed 's/:[^:]*$//')
            img_tags=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $3}')
            img_date=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $4}')
            
            # 检查是否已存在于现有行中
            found=false
            updated_existing_rows=""
            
            while IFS= read -r existing_line; do
              if [ -z "$existing_line" ]; then continue; fi
              
              # 提取现有行的镜像名称
              existing_name=$(echo "$existing_line" | awk -F'|' '{print $2}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              
              if [ "$existing_name" = "$img_name" ]; then
                # 找到匹配的行，更新标签
                existing_registry=$(echo "$existing_line" | awk -F'|' '{print $3}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                existing_tags=$(echo "$existing_line" | awk -F'|' '{print $4}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                existing_date=$(echo "$existing_line" | awk -F'|' '{print $5}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                
                # 合并标签，避免重复
                merged_tags="$existing_tags"
                for tag in $(echo "$img_tags" | tr ',' ' '); do
                  if [[ "$merged_tags" != *"$tag"* ]]; then
                    if [ -z "$merged_tags" ]; then
                      merged_tags="$tag"
                    else
                      merged_tags="$merged_tags,$tag"
                    fi
                  fi
                done
                
                # 更新行
                updated_line="| $existing_name | $existing_registry | $merged_tags | $img_date |"
                updated_existing_rows+="${updated_line}"$'\n'
                found=true
              else
                # 保留原行
                updated_existing_rows+="${existing_line}"$'\n'
              fi
            done <<< "$existing_rows"
            
            if [ "$found" = true ]; then
              # 已更新现有行
              existing_rows="$updated_existing_rows"
            else
              # 添加为新行
              processed_new_rows="$processed_new_rows$line\n"
            fi
          done <<< "$NEW_ROWS_DATA"
          
          # 格式化处理后的新行
          formatted_new_rows=""
          if [ -n "$processed_new_rows" ]; then
            formatted_new_rows=$(echo -e "$processed_new_rows" | sed '/^$/d' | awk -F"${UNIQUE_SEPARATOR}" '{printf("| %s | `%s` | %s | %s |\n", $1, $2, $3, $4)}')
          fi
          
          # 合并并排序所有行
          sorted_table_rows=$(
            {
              echo "$existing_rows" 
              echo -e "$formatted_new_rows"
            } | grep -v '^$' | awk -F'|' '
              {
                key = $2;
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", key);
                print key "@@@" $0;
              }
            ' | sort -f | sed 's/^.*@@@//'
          )

          {
            echo "${TABLE_TITLE}"
            echo ""
            echo "| Name | Registry | Tags | Sync Date |"
            echo "| :--- | :--- | :--- | :--- |"
            echo "$sorted_table_rows"
            echo ""
          } > new_table.tmp

          awk '
            BEGIN { replaced=0 }
            $0 == "'"${TABLE_TITLE}"'" && !replaced {
              while ((getline line < "new_table.tmp") > 0) { print line }
              close("new_table.tmp");
              replaced=1;
              skipping=1;
              next;
            }
            skipping {
              if (!/^\|/ && !/^$/) { skipping=0 } else { next }
            }
            { print }
          ' README.md > README.tmp && mv README.tmp README.md

          # 提交更改
          git add README.md

          # --- 3. README.zh-Hans.md 更新 ---
          echo "--------------------------------------------------"
          echo "开始更新 README.zh-Hans.md..."

          if [ -f "README.zh-Hans.md" ]; then
            README_ZH_FILE="README.zh-Hans.md"
            TABLE_TITLE_ZH="### 同步的镜像"
            REGISTRY_PREFIX_ZH="docker.cnb.cool/seatonjiang/monolith/"

            # 从README.zh-Hans.md中提取现有行
            existing_rows_zh=$(awk -v title="${TABLE_TITLE_ZH}" '
              $0 == title { in_table=1; next }
              in_table {
                if (/^\|/ && !/^\| :/ && !/^\| 镜像名称 \| 镜像链接 \| 标签 \| 同步时间 \|/) { print }
                if (!/^\|/ && !/^$/) { in_table=0 }
              }
            ' "${README_ZH_FILE}")

            # 重新处理新行数据，使用新的 registry 前缀
            NEW_ROWS_DATA_ZH=""
            while IFS= read -r line; do
              if [ -z "$line" ]; then continue; fi
              img_name=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $1}')
              img_tags=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $3}')
              img_date=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $4}')
              
              new_registry_zh="${REGISTRY_PREFIX_ZH}${img_name}"
              
              new_line_data_zh="${img_name}${UNIQUE_SEPARATOR}${new_registry_zh}${UNIQUE_SEPARATOR}${img_tags}${UNIQUE_SEPARATOR}${img_date}"
              NEW_ROWS_DATA_ZH+="${new_line_data_zh}"$'\n'
            done <<< "$NEW_ROWS_DATA"

            # 处理新行数据，合并相同镜像的标签
            processed_new_rows_zh=""
            while IFS= read -r line; do
              if [ -z "$line" ]; then continue; fi
              
              img_name=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $1}')
              img_registry=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $2}')
              img_tags=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $3}')
              img_date=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $4}')
              
              found=false
              updated_existing_rows_zh=""
              
              while IFS= read -r existing_line; do
                if [ -z "$existing_line" ]; then continue; fi
                
                existing_name=$(echo "$existing_line" | awk -F'|' '{print $2}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                
                if [ "$existing_name" = "$img_name" ]; then
                  existing_registry=$(echo "$existing_line" | awk -F'|' '{print $3}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                  existing_tags=$(echo "$existing_line" | awk -F'|' '{print $4}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                  
                  merged_tags="$existing_tags"
                  for tag in $(echo "$img_tags" | tr ',' ' '); do
                    if [[ "$merged_tags" != *"$tag"* ]]; then
                      if [ -z "$merged_tags" ]; then
                        merged_tags="$tag"
                      else
                        merged_tags="$merged_tags,$tag"
                      fi
                    fi
                  done
                  
                  updated_line="| $existing_name | $existing_registry | $merged_tags | $img_date |"
                  updated_existing_rows_zh+="${updated_line}"$'\n'
                  found=true
                else
                  updated_existing_rows_zh+="${existing_line}"$'\n'
                fi
              done <<< "$existing_rows_zh"
              
              if [ "$found" = true ]; then
                existing_rows_zh="$updated_existing_rows_zh"
              else
                processed_new_rows_zh+="$line"$'\n'
              fi
            done <<< "$NEW_ROWS_DATA_ZH"

            # 格式化处理后的新行
            formatted_new_rows_zh=""
            if [ -n "$processed_new_rows_zh" ]; then
              formatted_new_rows_zh=$(echo -e "$processed_new_rows_zh" | sed '/^$/d' | awk -F"${UNIQUE_SEPARATOR}" '{printf("| %s | `%s` | %s | %s |\n", $1, $2, $3, $4)}')
            fi

            # 合并并排序所有行
            sorted_table_rows_zh=$(
              {
                echo "$existing_rows_zh" 
                echo -e "$formatted_new_rows_zh"
              } | grep -v '^$' | awk -F'|' '
                {
                  key = $2;
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", key);
                  print key "@@@" $0;
                }
              ' | sort -f | sed 's/^.*@@@//'
            )

            # 生成新的表格临时文件
            {
              echo "${TABLE_TITLE_ZH}"
              echo ""
              echo "| 镜像名称 | 镜像链接 | 标签 | 同步时间 |"
              echo "| :--- | :--- | :--- | :--- |"
              echo "$sorted_table_rows_zh"
              echo ""
            } > new_table_zh.tmp

            # 替换 README.zh-Hans.md 中的表格
            awk -v title="${TABLE_TITLE_ZH}" '
              BEGIN { replaced=0 }
              $0 == title && !replaced {
                while ((getline line < "new_table_zh.tmp") > 0) { print line }
                close("new_table_zh.tmp");
                replaced=1;
                skipping=1;
                next;
              }
              skipping {
                if (!/^\|/ && !/^$/) { skipping=0 } else { next }
              }
              { print }
            ' "${README_ZH_FILE}" > README.tmp && mv README.tmp "${README_ZH_FILE}"

            # 添加到 git 并清理
            git add "${README_ZH_FILE}"
            rm -f new_table_zh.tmp
          fi

          if git diff --staged --quiet; then
            echo "没有新的镜像或文件变更可提交。"
          else
            git commit -m "chore(sync): 同步新镜像并更新README"
            git push
          fi
          
          # 清理临时文件
          rm -f new_table.tmp
