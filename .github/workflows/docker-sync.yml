name: Sync Docker Image

permissions:
  packages: write
  contents: write

on:
  workflow_dispatch:
    inputs:
      images:
        description: "Docker image information"
        required: true
        default: ""

jobs:
  docker-image-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y jq skopeo
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: seatonjiang
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to CNB
        uses: docker/login-action@v3
        with:
          registry: docker.cnb.cool
          username: cnb
          password: ${{ secrets.CNB_DOCKER_TOKEN }}

      - name: 同步镜像并更新 README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          
          # --- 1. 镜像同步与信息收集 ---
          NEW_ROWS_DATA=""
          UNIQUE_SEPARATOR="%%%"
          TABLE_TITLE="### Synced Images"

          # 从README中提取现有镜像信息（名称和标签）
          existing_image_info=$(awk '
            $0 == "'"${TABLE_TITLE}"'" { in_table=1; next }
            in_table {
              if (/^\|/) { 
                # 提取镜像名称和标签信息
                match($0, /\| *([^|]+) *\| *[^|]+ *\| *([^|]+) *\|/);
                if (RSTART) { 
                  name=$2; gsub(/^[ \t]*|[ \t]*$/, "", name);
                  tags=$4; gsub(/^[ \t]*|[ \t]*$/, "", tags);
                  print name ":::" tags;
                }
              }
              if (!/^\|/ && !/^$/) { in_table=0 }
            }
          ' README.md)

          IFS=',' read -r -a image_array <<< "${{ inputs.images }}"

          for i in "${!image_array[@]}"; do
            full_image=$(echo "${image_array[$i]}" | xargs)
            if [ -z "$full_image" ]; then continue; fi

            # 检查镜像和标签是否已存在
            current_image=$(echo "$full_image" | cut -d':' -f1)
            current_tag=$(echo "$full_image" | cut -s -d':' -f2); [ -z "$current_tag" ] && current_tag="latest"
            IMAGE_NAME=$(basename "$current_image")
            
            # 检查镜像是否存在，以及标签是否已包含
            image_exists=false
            existing_tags=""
            
            while IFS= read -r line; do
              if [ -z "$line" ]; then continue; fi
              
              # 使用 awk 替代 cut 来处理多字符分隔符
              img_name=$(echo "$line" | awk -F":::" '{print $1}')
              img_tags=$(echo "$line" | awk -F":::" '{print $2}')
              
              # 如果 img_name 包含冒号，只取第一部分
              if [[ "$img_name" == *":"* ]]; then
                img_name=$(echo "$img_name" | cut -d':' -f1)
              fi
              
              if [ "$img_name" = "$IMAGE_NAME" ]; then
                image_exists=true
                existing_tags="$img_tags"
                break
              fi
            done <<< "$existing_image_info"
            
            # 检查当前标签是否已存在于标签列表中
            if [ "$image_exists" = true ] && [[ "$existing_tags" == *"$current_tag"* ]]; then
              echo "镜像 $IMAGE_NAME 的标签 $current_tag 已存在于 README.md，跳过。"
              continue
            fi
            
            echo "--------------------------------------------------"
            echo "===== 开始处理 $full_image ====="
            target_tag="$current_tag"; [[ "$current_tag" =~ "alpine" ]] && target_tag="alpine"

            SOURCE_IMAGE_URI="docker://$current_image:$current_tag"
            GHCR_IMAGE_URI="docker://ghcr.io/seatonjiang/$IMAGE_NAME:$target_tag"
            CNB_IMAGE_URI="docker://docker.cnb.cool/seatonjiang/monolith/$IMAGE_NAME:$target_tag"
            
            # --- 这是补充的完整同步逻辑 ---
            echo "源镜像: $SOURCE_IMAGE_URI"
            echo "GHCR目标镜像: $GHCR_IMAGE_URI"
            echo "CNB目标镜像: $CNB_IMAGE_URI"
            
            # 先同步到本地临时目录
            LOCAL_IMAGE_URI="dir:/tmp/docker-sync/$IMAGE_NAME:$target_tag"
            echo "同步到本地: $LOCAL_IMAGE_URI"
            
            # 创建临时目录
            mkdir -p /tmp/docker-sync
            
            # 使用 skopeo copy 进行同步到本地，--all 参数会自动处理多架构
            if skopeo copy --override-arch amd64 --override-os windows "$SOURCE_IMAGE_URI" "$LOCAL_IMAGE_URI"; then
              echo "✅ 镜像同步到本地成功"
              
              # 从本地同步到 GHCR
              if skopeo copy --all "$LOCAL_IMAGE_URI" "$GHCR_IMAGE_URI"; then
                echo "✅ 镜像同步到 GHCR 成功"
              else
                echo "❌ 镜像同步到 GHCR 失败"
              fi
              
              # 从本地同步到 CNB
              if skopeo copy --all "$LOCAL_IMAGE_URI" "$CNB_IMAGE_URI"; then
                echo "✅ 镜像同步到 CNB 成功"
              else
                echo "❌ 镜像同步到 CNB 失败"
              fi
              
              # 清理临时目录
              rm -rf "/tmp/docker-sync/$IMAGE_NAME:$target_tag"
            else
              echo "❌ 镜像同步到本地失败"
              continue
            fi


            # --- 同步逻辑结束 ---

            # 准备新行的数据
            registry="ghcr.io/seatonjiang/$IMAGE_NAME"
            if [ "$target_tag" != "latest" ]; then
              registry="$registry:$target_tag"
            fi
            registry="\`$registry\`"
            
            # 确保 current_tag 不包含在 registry 中
            current_tag=$(echo "$current_tag" | sed 's/\`//g')
            
            # 获取当前日期作为同步日期（使用北京时间）
            sync_date=$(TZ='Asia/Shanghai' date +"%Y-%m-%d")
            
            # 处理标签列表
            if [ "$image_exists" = true ]; then
              # 如果镜像已存在，将新标签添加到现有标签列表
              if [ -z "$existing_tags" ]; then
                tags="$current_tag"
              else
                # 检查标签是否已存在
                if [[ "$existing_tags" != *"$current_tag"* ]]; then
                  tags="$existing_tags,$current_tag"
                else
                  tags="$existing_tags"
                fi
              fi
            else
              # 如果是新镜像，标签就是当前标签
              tags="$current_tag"
            fi
            
            # 准备新行数据，添加标签列
            new_line_data="${IMAGE_NAME}${UNIQUE_SEPARATOR}${registry}${UNIQUE_SEPARATOR}${tags}${UNIQUE_SEPARATOR}${sync_date}"
            NEW_ROWS_DATA+="${new_line_data}\n"
          done

          if [ -z "$NEW_ROWS_DATA" ]; then
            echo "--------------------------------------------------"
            echo "没有新的镜像被添加，无需更新 README.md。"
            exit 0
          fi

          # --- 2. README 更新、排序与重写 ---
          echo "--------------------------------------------------"
          echo "开始更新 README.md..."

          existing_rows=$(awk '
            $0 == "'"${TABLE_TITLE}"'" { in_table=1; next }
            in_table {
              if (/^\|/ && !/^\| :/ && !/^\| Name \| Registry \| Tags \| Sync Date \|/) { print }
              if (!/^\|/ && !/^$/) { in_table=0 }
            }
          ' README.md)

          # 处理新行数据，合并相同镜像的标签
          processed_new_rows=""
          while IFS= read -r line; do
            if [ -z "$line" ]; then continue; fi
            
            # 解析新行数据
            img_name=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $1}')
            img_registry=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $2}')
            img_tags=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $3}')
            img_date=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $4}')
            
            # 检查是否已存在于现有行中
            found=false
            updated_existing_rows=""
            
            while IFS= read -r existing_line; do
              if [ -z "$existing_line" ]; then continue; fi
              
              # 提取现有行的镜像名称
              existing_name=$(echo "$existing_line" | awk -F'|' '{print $2}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              
              if [ "$existing_name" = "$img_name" ]; then
                # 找到匹配的行，更新标签
                existing_registry=$(echo "$existing_line" | awk -F'|' '{print $3}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                existing_tags=$(echo "$existing_line" | awk -F'|' '{print $4}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                existing_date=$(echo "$existing_line" | awk -F'|' '{print $5}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                
                # 合并标签，避免重复
                merged_tags="$existing_tags"
                for tag in $(echo "$img_tags" | tr ',' ' '); do
                  # 确保标签不包含 registry 信息
                  clean_tag=$(echo "$tag" | sed 's/^.*\/\([^\/]*\)$/\1/g' | sed 's/\`//g')
                  if [[ "$merged_tags" != *"$clean_tag"* ]]; then
                    if [ -z "$merged_tags" ]; then
                      merged_tags="$clean_tag"
                    else
                      merged_tags="$merged_tags,$clean_tag"
                    fi
                  fi
                done
                
                # 更新行
                updated_line="| $existing_name | $existing_registry | $merged_tags | $img_date |"
                if [ -z "$updated_existing_rows" ]; then
                  updated_existing_rows="$updated_line"
                else
                  updated_existing_rows="$updated_existing_rows\n$updated_line"
                fi
                found=true
              else
                # 保留原行
                if [ -z "$updated_existing_rows" ]; then
                  updated_existing_rows="$existing_line"
                else
                  updated_existing_rows="$updated_existing_rows\n$existing_line"
                fi
              fi
            done <<< "$existing_rows"
            
            if [ "$found" = true ]; then
              # 已更新现有行
              existing_rows="$updated_existing_rows"
            else
              # 添加为新行
              if [ -z "$processed_new_rows" ]; then
                processed_new_rows="$line"
              else
                processed_new_rows="$processed_new_rows\n$line"
              fi
            fi
          done <<< "$NEW_ROWS_DATA"
          
          # 格式化处理后的新行
          formatted_new_rows=""
          if [ -n "$processed_new_rows" ]; then
            formatted_new_rows=$(echo -e "$processed_new_rows" | sed '/^$/d' | awk -F"${UNIQUE_SEPARATOR}" '{printf("| %s | %s | %s | %s |\n", $1, $2, $3, $4)}')
          fi
          
          # 合并并排序所有行
          sorted_table_rows=$(
            {
              echo -e "$existing_rows" 
              echo -e "$formatted_new_rows"
            } | grep -v '^$' | awk -F'|' '
              {
                key = $2;
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", key);
                print key "@@@" $0;
              }
            ' | sort -f | sed 's/^.*@@@//'
          )

          {
            echo "${TABLE_TITLE}"
            echo ""
            echo "| Name | Registry | Tags | Sync Date |"
            echo "| :--- | :--- | :--- | :--- |"
            echo "$sorted_table_rows"
          } > new_table.tmp

          awk '
            BEGIN { replaced=0 }
            $0 == "'"${TABLE_TITLE}"'" && !replaced {
              while ((getline line < "new_table.tmp") > 0) { print line }
              close("new_table.tmp");
              replaced=1;
              skipping=1;
              next;
            }
            skipping {
              if (!/^\|/ && !/^$/) { 
                print "";  # 在表格结束后添加空行
                skipping=0 
              } else if (/^$/) {
                print "";  # 如果是空行，保留它
                skipping=0
              } else { 
                next 
              }
            }
            { print }
          ' README.md > README.tmp && mv README.tmp README.md

          # 更新中文版 README
          echo "--------------------------------------------------"
          echo "开始更新 README.zh-Hans.md..."
          
          # 确保临时文件干净
          rm -f new_table.tmp
          
          # 复制英文版表格到中文版
          awk '
            BEGIN { replaced=0; title_printed=0 }
            $0 == "### 同步的镜像" && !replaced {
              print "### 同步的镜像";
              print "";
              print "| 镜像名称 | 镜像链接 | 标签 | 同步时间 |";
              print "| :--- | :--- | :--- | :--- |";
              title_printed=1;
              
              # 创建中文版表格内容
              echo "$sorted_table_rows" > zh_table.tmp
              
              # 读取中文版表格内容
              while ((getline line < "zh_table.tmp") > 0) {
                print line;
              }
              close("zh_table.tmp");
              rm -f zh_table.tmp
              }
              close("new_table.tmp");
              replaced=1;
              skipping=1;
              next;
            }
            skipping {
              if (!/^\|/ && !/^$/) { 
                print "";  # 在表格结束后添加空行
                skipping=0 
              } else if (/^$/) {
                print "";  # 如果是空行，保留它
                skipping=0
              } else { 
                next 
              }
            }
            { print }
          ' README.zh-Hans.md > README.zh-Hans.tmp && mv README.zh-Hans.tmp README.zh-Hans.md
          
          # 提交更改
          git add README.md README.zh-Hans.md
          if git diff --staged --quiet; then
            echo "没有新的镜像或文件变更可提交。"
          else
            git commit -m "chore(sync): 同步新镜像并更新README"
            git push
          fi
          
          # 清理临时文件
          rm -f new_table.tmp
