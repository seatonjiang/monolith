name: Build PHP 8.1 Image

on:
  workflow_dispatch:

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: seatonjiang
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to CNB
        uses: docker/login-action@v3
        with:
          registry: docker.cnb.cool
          username: cnb
          password: ${{ secrets.CNB_DOCKER_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/seatonjiang/php
            docker.cnb.cool/seatonjiang/monolith/php
          tags: |
            8.1-fpm-alpine

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./.github/dockerfile/php-8.1
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Update build record
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase

          IMAGE_NAME="PHP 8.1"
          BUILD_TIME=$(date -u '+%Y-%m-%d')
          README_FILE="README.md"
          README_ZH_FILE="README.zh-Hans.md"
          TEMP_README="README.tmp"
          TEMP_README_ZH="README.zh-Hans.tmp"

          # Update English README
          if grep -qF "$IMAGE_NAME" "$README_FILE"; then
            echo "Updating build date in English README: $IMAGE_NAME"

            awk -v image_name="$IMAGE_NAME" -v new_date="$BUILD_TIME" '
            BEGIN {
                FS = "\\s*\\|\\s*";
                in_build_table = 0;
            }

            /^### Built Images/ { in_build_table = 1 }
            /^### Synced Images/ { in_build_table = 0 }

            in_build_table && $2 ~ image_name {
                printf "| %s | %s | %s | %s |", $2, $3, $4, new_date
                print ""
                next
            }
            
            { print $0 }
            ' "$README_FILE" > "$TEMP_README" && mv "$TEMP_README" "$README_FILE"
          fi

          # Update Chinese README
          if grep -qF "$IMAGE_NAME" "$README_ZH_FILE"; then
            echo "Updating build date in Chinese README: $IMAGE_NAME"

            awk -v image_name="$IMAGE_NAME" -v new_date="$BUILD_TIME" '
            BEGIN {
                FS = "\\s*\\|\\s*";
                in_build_table = 0;
            }

            /^### 构建的镜像/ { in_build_table = 1 }
            /^### 同步的镜像/ { in_build_table = 0 }

            in_build_table && $2 ~ image_name {
                printf "| %s | %s | %s | %s |", $2, $3, $4, new_date
                print ""
                next
            }
            
            { print $0 }
            ' "$README_ZH_FILE" > "$TEMP_README_ZH" && mv "$TEMP_README_ZH" "$README_ZH_FILE"
          fi

          git add "$README_FILE" "$README_ZH_FILE"
          if git diff --staged --quiet; then
            echo "No changes in README files, no commit needed."
          else
            git commit -m "docs: update build record for image"
            git push
          fi
