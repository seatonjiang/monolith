name: 更新 Docker 镜像 → 定时更新 ghcr.io

on:
  schedule:
    # 每天的 UTC 时间 16:00 (北京时间 00:00) 运行
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. 安装依赖
        run: sudo apt-get update && sudo apt-get install -y jq skopeo

      - name: 3. 从 README 中提取镜像列表
        id: extract-images
        run: |
          set -e
          echo "===== 从 README.md 提取待检查的镜像 ====="
          
          # 始终先创建文件，以防后续步骤失败
          > image-list.txt

          # 生成中间文件
          awk '
            /^### 同步的镜像/ { in_table=1; next }
            in_table {
              # 匹配表格行, 忽略表头和分隔线
              if ($0 ~ /^\|/ && $0 !~ /镜像名称/ && $0 !~ /:---/) {
                print
              }
              # 表格结束
              if (in_table && $0 !~ /^\|/ && $0 !~ /^$/) {
                in_table=0
              }
            }
          ' README.md | \
          # 提取第2列(名称)和第4列(标签)
          awk -F'|' '{
            name = $2; gsub(/^[[:space:]]+|[[:space:]]+$/, "", name);
            tags = $4; gsub(/^[[:space:]]+|[[:space:]]+$/, "", tags);
            if (name != "" && tags != "") {
              print name"|"tags
            }
          }' > image-name-and-tags.txt

          # 如果中间文件有内容，则处理它
          if [ -s image-name-and-tags.txt ]; then
            while IFS='|' read -r name tags; do
              for tag in $(echo "$tags" | tr ',' ' '); do
                echo "$name|$tag" >> image-list.txt
              done
            done < image-name-and-tags.txt
          else
            echo "未在 README.md 中找到要同步的镜像。"
          fi

          echo "===== 将要检查的镜像和标签 ====="
          cat image-list.txt

      - name: 4a. 检查 Docker Hub 凭证是否存在
        id: check_dockerhub_creds
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 4b. 登录到 Docker Hub (如果凭证存在)
        if: steps.check_dockerhub_creds.outputs.present == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 5. 登录到 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 6. 检查并同步镜像
        id: sync
        env:
          GHCR_USER: ${{ github.repository_owner }}
          DOCKER_CONFIG: /home/runner/.docker
        run: |
          set -eo pipefail
          
          # 标记是否有任何镜像被更新
          updated_any=false

          # 函数：从 manifest 内容中为指定架构提取唯一的 digest
          get_digest_for_arch() {
            local manifest_content=$1
            local arch_name=$2
            if [ -z "$manifest_content" ]; then echo ""; return; fi
            
            if echo "$manifest_content" | jq -e '.manifests' > /dev/null 2>&1; then
              # 精确匹配架构，并处理 arm/v7 和 arm64/v8 变体
              echo "$manifest_content" | jq -r --arg arch "$arch_name" '
                .manifests[] | 
                select(
                  (.platform.architecture == $arch and .platform.variant? == null) or
                  ($arch == "arm" and .platform.architecture == "arm" and .platform.variant? == "v7") or
                  ($arch == "arm64" and .platform.architecture == "arm64" and .platform.variant? == "v8")
                ) | .digest' | head -n 1
            else
              # 单架构镜像
              echo "$manifest_content" | jq -r '.digest // empty'
            fi
          }

          echo "===== 开始同步镜像 ====="
          
          while IFS='|' read -r image_name image_tag; do
            echo "────────────────────────────────────────"
            echo "处理镜像: $image_name:$image_tag"
            
            # 1. 重建源镜像 URI
            if [[ "$image_name" == *"/"* ]]; then
              if [[ "$image_name" == "gcr.io/"* || "$image_name" == "quay.io/"* ]]; then
                SOURCE_IMAGE_NAME="$image_name"
              else
                SOURCE_IMAGE_NAME="docker.io/$image_name"
              fi
            else
              SOURCE_IMAGE_NAME="docker.io/library/$image_name"
            fi
            SOURCE_IMAGE_URI="docker://${SOURCE_IMAGE_NAME}:${image_tag}"

            # 2. 构建目标镜像 URI
            owner_lowercase=$(echo "$GHCR_USER" | tr 'A-Z' 'a-z')
            TARGET_IMAGE_URI="docker://ghcr.io/$owner_lowercase/$image_name:$image_tag"

            # 3. 检查源镜像清单
            if ! source_manifest=$(skopeo inspect --authfile ${DOCKER_CONFIG}/config.json --raw "$SOURCE_IMAGE_URI" 2>/dev/null); then
              echo "❌ 错误：执行 'skopeo inspect' 失败 (可能是网络问题或镜像不存在)，已跳过 '$SOURCE_IMAGE_URI'。"
              continue
            fi
            if [ -z "$source_manifest" ]; then
              echo "❌ 错误：无法获取源镜像清单 (清单为空)，已跳过 '$SOURCE_IMAGE_URI'。"
              continue
            fi
            
            # 4. 检查目标镜像清单
            target_manifest=$(skopeo inspect --authfile ${DOCKER_CONFIG}/config.json --raw "$TARGET_IMAGE_URI" 2>/dev/null || echo "")
            
            # 5. 对比摘要
            ARCHS_TO_CHECK="amd64 arm64 arm"
            need_update=false
            if [ -z "$target_manifest" ]; then
              need_update=true
              echo "目标镜像不存在，判定需要同步。"
            else
              for arch in $ARCHS_TO_CHECK; do
                source_digest_for_arch=$(get_digest_for_arch "$source_manifest" "$arch")
                if [ -z "$source_digest_for_arch" ]; then continue; fi

                target_digest_for_arch=$(get_digest_for_arch "$target_manifest" "$arch")
                echo "检查架构 '$arch': 源[${source_digest_for_arch:0:12}] <=> 目标[${target_digest_for_arch:0:12}]"
                
                if [ "$source_digest_for_arch" != "$target_digest_for_arch" ]; then
                  need_update=true
                  echo "发现不匹配的摘要，判定需要同步。"
                  break
                fi
              done
            fi

            if [ "$need_update" = "false" ]; then
              echo "✅ 所有已检查架构的摘要均匹配，跳过同步。"
              continue
            fi

            # 6. 同步镜像
            echo "开始使用 skopeo copy 同步..."
            if skopeo copy --all --authfile ${DOCKER_CONFIG}/config.json "$SOURCE_IMAGE_URI" "$TARGET_IMAGE_URI"; then
              echo "✅ 镜像同步成功: $image_name:$image_tag"
              updated_any=true
              
              # 7. 更新 READMEs
              today=$(date +'%Y-%m-%d')
              # 更新 README.md
              awk -F'|' -v img_name="$image_name" -v date="$today" '
                BEGIN{OFS=FS}
                {
                  current_name = $2;
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", current_name);
                  if (current_name == img_name) {
                      $5 = " " date " ";
                  }
                  print;
                }
              ' README.md > README.tmp && mv README.tmp README.md
              echo "已更新 README.md 中的同步日期。"

              # 更新 README.zh-Hans.md
              if [ -f README.zh-Hans.md ]; then
                awk -F'|' -v img_name="$image_name" -v date="$today" '
                  BEGIN{OFS=FS}
                  {
                    current_name = $2;
                    gsub(/^[[:space:]]+|[[:space:]]+$/, "", current_name);
                    if (current_name == img_name) {
                        $5 = " " date " ";
                    }
                    print;
                  }
                ' README.zh-Hans.md > README.zh.tmp && mv README.zh.tmp README.zh-Hans.md
                echo "已更新 README.zh-Hans.md 中的同步日期。"
              fi
            else
              echo "❌ 镜像同步失败，请检查源镜像是否存在或网络连接。"
              continue
            fi
          done < image-list.txt
          
          echo "updated_any=$updated_any" >> "$GITHUB_OUTPUT"

      - name: 7. 提交 README 变更
        if: steps.sync.outputs.updated_any == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README.zh-Hans.md
          if ! git diff --staged --quiet; then
            git commit -m "chore(sync): 自动更新镜像同步日期"
            git push
          else
            echo "README 文件无变更，无需提交。"
          fi
