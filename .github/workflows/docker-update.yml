name: Update Docker Image

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y jq skopeo

      - name: 3. 提取目标镜像名称
        id: extract-images
        run: |
          # This script extracts image names and tags from the "Synced Images" table in README.md.
          # It handles multiple comma-separated tags in a single row, creating a new entry for each.
          awk '
          BEGIN {
            FS = "|";
            in_table = 0;
            header_found = 0;
            name_col = 0;
            tags_col = 0;
          }
          # Start processing when the "Synced Images" header is found
          /^### Synced Images/ { in_table = 1; next; }
          # Find the header row to dynamically determine column indices for "Name" and "Tags"
          in_table && /^\| *Name *\|/ {
            header_found = 1;
            for (i=1; i<=NF; i++) {
              header = $i;
              gsub(/^[ \t]+|[ \t]+$/, "", header); # Trim whitespace
              if (header == "Name") name_col = i;
              if (header == "Tags") tags_col = i;
            }
            next;
          }
          # Skip the markdown table separator line
          in_table && header_found && /^\| *:/ { next; }
          # Process data rows
          in_table && header_found && /^\|/ {
            if (name_col > 0 && tags_col > 0) {
              name = $name_col;
              tags = $tags_col;
              # Trim whitespace from name and tags fields
              gsub(/^[ \t]+|[ \t]+$/, "", name);
              gsub(/^[ \t]+|[ \t]+$/, "", tags);
              
              if (name != "" && tags != "") {
                # Split comma-separated tags into an array
                split(tags, tag_array, ",");
                for (j in tag_array) {
                  current_tag = tag_array[j];
                  gsub(/^[ \t]+|[ \t]+$/, "", current_tag); # Trim tag
                  if (current_tag != "") {
                    print name ":" current_tag;
                  }
                }
              }
            }
          }
          # Stop processing when a new markdown header is found
          /^###/ && in_table && !/Synced Images/ { in_table = 0; }
          ' README.md > target-image-list.txt

          echo "===== Generated Image List ====="
          cat target-image-list.txt

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: seatonjiang
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to CNB
        uses: docker/login-action@v3
        with:
          registry: docker.cnb.cool
          username: cnb
          password: ${{ secrets.CNB_DOCKER_TOKEN }}

      - name: 6. 检查并同步镜像
        id: sync
        env:
          GHCR_USER: ${{ github.repository_owner }}
          DOCKER_CONFIG: /home/runner/.docker
        run: |
          set -eo pipefail
          
          updated_any=false

          get_digest_for_arch() {
            local manifest_content=$1
            local arch_name=$2
            if [ -z "$manifest_content" ]; then echo ""; return; fi
            
            if echo "$manifest_content" | jq -e '.manifests' > /dev/null 2>&1; then
              echo "$manifest_content" | jq -r --arg arch "$arch_name" '
                .manifests[] | 
                select(
                  (.platform.architecture == $arch and .platform.variant? == null) or
                  ($arch == "arm" and .platform.architecture == "arm" and .platform.variant? == "v7") or
                  ($arch == "arm64" and .platform.architecture == "arm64" and .platform.variant? == "v8")
                ) | .digest' | head -n 1
            else
              echo "$manifest_content" | jq -r '.digest // empty'
            fi
          }

          echo "===== 开始同步镜像 ====="
          
          while IFS='|' read -r image_name image_tag; do
            if [ -z "$image_name" ]; then continue; fi
            echo "────────────────────────────────────────"
            echo "处理镜像: $image_name:$image_tag"
            
            if [[ "$image_name" == */* ]]; then
              if [[ "$image_name" == "gcr.io/"* || "$image_name" == "quay.io/"* ]]; then
                SOURCE_IMAGE_NAME="$image_name"
              else
                SOURCE_IMAGE_NAME="docker.io/$image_name"
              fi
            else
              SOURCE_IMAGE_NAME="docker.io/library/$image_name"
            fi
            SOURCE_IMAGE_URI="docker://${SOURCE_IMAGE_NAME}:${image_tag}"

            owner_lowercase=$(echo "$GHCR_USER" | tr 'A-Z' 'a-z')
            TARGET_IMAGE_URI="docker://ghcr.io/$owner_lowercase/$image_name:$image_tag"

            if ! source_manifest=$(skopeo inspect --authfile ${DOCKER_CONFIG}/config.json --raw "$SOURCE_IMAGE_URI" 2>/dev/null); then
              echo "❌ 错误：检查源镜像失败 '$SOURCE_IMAGE_URI'。"
              continue
            fi
            if [ -z "$source_manifest" ]; then
              echo "❌ 错误：源镜像清单为空 '$SOURCE_IMAGE_URI'。"
              continue
            fi
            
            target_manifest=$(skopeo inspect --authfile ${DOCKER_CONFIG}/config.json --raw "$TARGET_IMAGE_URI" 2>/dev/null || echo "")
            
            ARCHS_TO_CHECK="amd64 arm64 arm"
            need_update=false
            if [ -z "$target_manifest" ]; then
              need_update=true
              echo "目标镜像不存在，需要同步。"
            else
              for arch in $ARCHS_TO_CHECK; do
                source_digest_for_arch=$(get_digest_for_arch "$source_manifest" "$arch")
                if [ -z "$source_digest_for_arch" ]; then continue; fi

                target_digest_for_arch=$(get_digest_for_arch "$target_manifest" "$arch")
                echo "检查架构 '$arch': 源[${source_digest_for_arch:0:12}] <=> 目标[${target_digest_for_arch:0:12}]"
                
                if [ "$source_digest_for_arch" != "$target_digest_for_arch" ]; then
                  need_update=true
                  echo "摘要不匹配，需要同步。"
                  break
                fi
              done
            fi

            if [ "$need_update" = "false" ]; then
              echo "✅ 摘要匹配，跳过同步。"
              continue
            fi

            echo "开始同步..."
            if skopeo copy --all --authfile ${DOCKER_CONFIG}/config.json "$SOURCE_IMAGE_URI" "$TARGET_IMAGE_URI"; then
              echo "✅ 同步成功: $image_name:$image_tag"
              updated_any=true
              
              today=$(date +'%Y-%m-%d')
              
              awk -F'|' -v img_name="$image_name" -v date="$today" '
                BEGIN{OFS=FS} {
                  current_name = $2;
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", current_name);
                  if (current_name == img_name) { $5 = " " date " "; }
                  print;
                }' README.md > README.tmp && mv README.tmp README.md
              echo "已更新 README.md"

              if [ -f README.zh-Hans.md ]; then
                awk -F'|' -v img_name="$image_name" -v date="$today" '
                  BEGIN{OFS=FS} {
                    current_name = $2;
                    gsub(/^[[:space:]]+|[[:space:]]+$/, "", current_name);
                    if (current_name == img_name) { $5 = " " date " "; }
                    print;
                  }' README.zh-Hans.md > README.zh.tmp && mv README.zh.tmp README.zh-Hans.md
                echo "已更新 README.zh-Hans.md"
              fi
            else
              echo "❌ 同步失败。"
              continue
            fi
          done < target-image-list.txt
          
          echo "updated_any=$updated_any" >> "$GITHUB_OUTPUT"

      - name: 7. 提交 README 变更
        if: steps.sync.outputs.updated_any == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README.zh-Hans.md
          if ! git diff --staged --quiet; then
            git commit -m "chore(sync): 自动更新镜像同步日期"
            git push
          else
            echo "README 文件无变更，无需提交。"
          fi
