name: Build PHP 8.4 Image

on:
  schedule:
    - cron: "24 6 * * 1"
  workflow_dispatch:

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: seatonjiang
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to CNB
        uses: docker/login-action@v3
        with:
          registry: docker.cnb.cool
          username: cnb
          password: ${{ secrets.CNB_DOCKER_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/seatonjiang/php
            docker.cnb.cool/seatonjiang/monolith/php
          tags: |
            8.4-fpm-alpine

      - name: Generate Dockerfile
        run: |
          mkdir -p /tmp/docker-build-php
          cat > /tmp/docker-build-php/Dockerfile << 'EOL'
          FROM php:8.4-fpm-alpine
          ADD --chmod=0755 https://github.com/mlocati/docker-php-extension-installer/releases/latest/download/install-php-extensions /usr/local/bin/
          RUN install-php-extensions redis memcached opcache pdo_mysql mysqli zip gd imagick igbinary bz2 exif bcmath intl
          EOL
          cat /tmp/docker-build-php/Dockerfile

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: /tmp/docker-build-php/Dockerfile
          platforms: linux/amd64,linux/arm64/v8,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Update build record
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase

          IMAGE_NAME="PHP 8.4"
          BUILD_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          README_FILE="README.md"
          TEMP_README="README.tmp"

          # Update README
          if grep -qF "$IMAGE_NAME" "$README_FILE"; then
            echo "Updating build date in README: $IMAGE_NAME"

            awk -v image_name="$IMAGE_NAME" -v new_date="$BUILD_TIME" '
            BEGIN {
                FS = "\\s*\\|\\s*";
                in_build_table = 0;
            }

            /^### 构建的镜像/ { in_build_table = 1 }
            /^### 同步的镜像/ { in_build_table = 0 }

            in_build_table && $2 ~ image_name {
                printf "| %s | %s | %s | %s |", $2, $3, $4, new_date
                print ""
                next
            }
            
            { print $0 }
            ' "$README_FILE" > "$TEMP_README" && mv "$TEMP_README" "$README_FILE"
          fi

          git add "$README_FILE"
          if git diff --staged --quiet; then
            echo "No changes in README file, no commit needed."
          else
            git commit -m "docs: update build record for image"
            git push
          fi
