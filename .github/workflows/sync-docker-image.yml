name: "新增 Docker 镜像"

on:
  workflow_dispatch:
    inputs:
      images:
        description: "Docker 镜像列表（image:tag,image:tag）"
        required: true
        default: ""

permissions:
  packages: write
  contents: write

jobs:
  docker-image-sync:
    name: "新增 Docker 镜像"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y jq skopeo
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: seatonjiang
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to CNB
        uses: docker/login-action@v3
        with:
          registry: docker.cnb.cool
          username: cnb
          password: ${{ secrets.CNB_DOCKER_TOKEN }}

      - name: Sync Docker Images and Update README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          
          NEW_ROWS_DATA=""
          UNIQUE_SEPARATOR="%%%"
          TABLE_TITLE="### 同步的镜像"

          existing_image_info=$(awk '
            $0 == "'"${TABLE_TITLE}"'" { in_table=1; next }
            in_table {
              if (/^\|/) {
                if (match($0, /\| *([^|]+) *\| *[^|]+ *\| *([^|]+) *\|/, parts)) {
                  name=parts[1];
                  tags=parts[2];
                  gsub(/^[ \t]*|[ \t]*$/, "", name);
                  gsub(/^[ \t]*|[ \t]*$/, "", tags);
                  print name ":::" tags;
                }
              }
              if (!/^\|/ && !/^$/) { in_table=0 }
            }
          ' README.md)

          IFS=',' read -r -a image_array <<< "${{ inputs.images }}"

          for i in "${!image_array[@]}"; do
            full_image=$(echo "${image_array[$i]}" | xargs)
            if [ -z "$full_image" ]; then continue; fi

            current_image=$(echo "$full_image" | cut -d':' -f1)
            current_tag=$(echo "$full_image" | cut -s -d':' -f2)
            IMAGE_NAME="$current_image"
            DEST_IMAGE_NAME=$(basename "$current_image")
            
            image_exists=false
            existing_tags=""
            
            while IFS= read -r line; do
              if [ -z "$line" ]; then continue; fi
              
              img_name=$(echo "$line" | awk -F":::" '{print $1}')
              img_tags=$(echo "$line" | awk -F":::" '{print $2}')
              
              if [[ "$img_name" == *":"* ]]; then
                img_name=$(echo "$img_name" | cut -d':' -f1)
              fi
              
              if [ "$img_name" = "$IMAGE_NAME" ] || [ "$img_name" = "$DEST_IMAGE_NAME" ]; then
                image_exists=true
                existing_tags="$img_tags"
                break
              fi
            done <<< "$existing_image_info"
            
            if [ "$image_exists" = true ] && [[ "$existing_tags" == *"$current_tag"* ]]; then
              echo "Tag $current_tag for image $IMAGE_NAME already exists, skipping!"
              continue
            fi
            
            echo "Processing $full_image..."
            target_tag="$current_tag"

            SOURCE_IMAGE_URI="docker://$current_image:$current_tag"
            GHCR_IMAGE_URI="docker://ghcr.io/seatonjiang/$DEST_IMAGE_NAME:$target_tag"
            CNB_IMAGE_URI="docker://docker.cnb.cool/seatonjiang/monolith/$DEST_IMAGE_NAME:$target_tag"
          
            LOCAL_IMAGE_URI="dir:/tmp/docker-sync/$DEST_IMAGE_NAME:$target_tag"
            
            mkdir -p /tmp/docker-sync
            
            if skopeo copy --all "$SOURCE_IMAGE_URI" "$LOCAL_IMAGE_URI"; then
              echo "Local sync of $full_image successful!"
              
              if skopeo copy --all "$LOCAL_IMAGE_URI" "$GHCR_IMAGE_URI"; then
                echo "GHCR sync of $full_image successful!"
              else
                echo "GHCR sync of $full_image failed!"
              fi
              
              if skopeo copy --all "$LOCAL_IMAGE_URI" "$CNB_IMAGE_URI"; then
                echo "CNB sync of $full_image successful!"
              else
                echo "CNB sync of $full_image failed!"
              fi
              
              rm -rf "/tmp/docker-sync/$DEST_IMAGE_NAME:$target_tag"
            else
              echo "Local sync of $full_image failed!"
              continue
            fi

            registry="ghcr.io/seatonjiang/$DEST_IMAGE_NAME"
            
            sync_date=$(TZ='Asia/Shanghai' date +"%Y-%m-%d")
            
            if [ "$image_exists" = true ]; then
              if [ -z "$existing_tags" ]; then
                tags="$current_tag"
              else
                if [[ "$existing_tags" != *"$current_tag"* ]]; then
                  tags="$existing_tags,$current_tag"
                else
                  tags="$existing_tags"
                fi
              fi
            else
              tags="$current_tag"
            fi
            
            new_line_data="${IMAGE_NAME}${UNIQUE_SEPARATOR}${registry}${UNIQUE_SEPARATOR}${tags}${UNIQUE_SEPARATOR}${sync_date}"
            NEW_ROWS_DATA+="${new_line_data}"$'\n'
          done

          if [ -z "$NEW_ROWS_DATA" ]; then
            echo "No new images added, no update needed!"
            exit 0
          fi

          echo "Updating README.md..."

          existing_rows=$(awk '
            $0 == "'"${TABLE_TITLE}"'" { in_table=1; next }
            in_table {
              if (/^\|/ && !/^\| :/ && !/^\| 镜像名称 \| 镜像地址 \| 标签 \| 同步日期 \|/) { print }
              if (!/^\|/ && !/^$/) { in_table=0 }
            }
          ' README.md)

          processed_new_rows=""
          while IFS= read -r line; do
            if [ -z "$line" ]; then continue; fi
            
            img_name=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $1}')
            img_registry=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $2}' | sed 's/:[^:]*$//')
            img_tags=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $3}')
            img_date=$(echo "$line" | awk -F"${UNIQUE_SEPARATOR}" '{print $4}')
            
            found=false
            updated_existing_rows=""
            
            while IFS= read -r existing_line; do
              if [ -z "$existing_line" ]; then continue; fi
              
              existing_name=$(echo "$existing_line" | awk -F'|' '{print $2}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              
              if [ "$existing_name" = "$img_name" ] || [ "$existing_name" = "$(basename "$img_name")" ]; then
                existing_registry=$(echo "$existing_line" | awk -F'|' '{print $3}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                existing_tags=$(echo "$existing_line" | awk -F'|' '{print $4}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                existing_date=$(echo "$existing_line" | awk -F'|' '{print $5}' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                
                merged_tags="$existing_tags"
                for tag in $(echo "$img_tags" | tr ',' ' '); do
                  if [[ "$merged_tags" != *"$tag"* ]]; then
                    if [ -z "$merged_tags" ]; then
                      merged_tags="$tag"
                    else
                      merged_tags="$merged_tags,$tag"
                    fi
                  fi
                done
                
                updated_line="| $img_name | $existing_registry | $merged_tags | $img_date |"
                updated_existing_rows+="${updated_line}"$'\n'
                found=true
              else
                updated_existing_rows+="${existing_line}"$'\n'
              fi
            done <<< "$existing_rows"
            
            if [ "$found" = true ]; then
              existing_rows="$updated_existing_rows"
            else
              processed_new_rows+="${line}"$'\n'
            fi
          done <<< "$NEW_ROWS_DATA"
          
          formatted_new_rows=""
          if [ -n "$processed_new_rows" ]; then
            formatted_new_rows=$(echo -e "$processed_new_rows" | sed '/^$/d' | awk -F"${UNIQUE_SEPARATOR}" '{
              img_name=$1; 
              ghcr_registry=$2; 
              cnb_registry="docker.cnb.cool/seatonjiang/monolith/" $1; 
              tags=$3; 
              date=$4; 
              printf("| %s | `%s` <br> `%s` | %s | %s |\\n", img_name, ghcr_registry, cnb_registry, tags, date)
            }')
          fi
          
          sorted_table_rows=$(
            {
              echo "$existing_rows" 
              echo -e "$formatted_new_rows"
            } | grep -v '^$' | awk -F'|' '
              {
                key = $2;
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", key);
                print key "@@@" $0;
              }
            ' | sort -f | sed 's/^.*@@@//'
          )

          {
            echo "${TABLE_TITLE}"
            echo ""
            echo "| 镜像名称 | 镜像地址 | 标签 | 同步日期 |"
            echo "| :--- | :--- | :--- | :--- |"
            echo "$sorted_table_rows"
            echo ""
          } > new_table.tmp

          awk -v title="${TABLE_TITLE}" '
            BEGIN { replaced=0; skipping=0 }
            $0 == title && !replaced {
              while ((getline line < "new_table.tmp") > 0) { print line }
              close("new_table.tmp");
              replaced=1;
              skipping=1;
              next;
            }
            skipping {
              if (/^\|/ || /^$/) { 
                next 
              } else { 
                skipping=0;
                print;
                next;
              }
            }
            { print }
          ' README.md > README.tmp && mv README.tmp README.md

          git add README.md
          rm -f new_table.tmp

          if git diff --staged --quiet; then
            echo "No changes in README file, no commit needed."
          else
            git commit -m "docs: add a synced Docker image"
            git push
          fi

          rm -f new_table.tmp
